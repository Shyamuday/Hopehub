name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - apps/api
          - apps/user-web
          - apps/doctor-web
          - apps/admin-web
          - apps/store
          - apps/store-manager-web
          - apps/hr-web
          - apps/receptionist-web
          - apps/clinic-manager-web
          - apps/accountant-web
          - apps/supplier-web
          - apps/warehouse-web

    defaults:
      run:
        working-directory: ${{ matrix.app }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install
        run: npm ci

      - name: Prisma generate
        if: matrix.app == 'apps/api'
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
