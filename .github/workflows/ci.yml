name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root tooling
        run: npm ci

      - name: ESLint
        run: npx eslint .

      - name: API install and generate
        working-directory: apps/api
        run: npm ci && npm run prisma:generate

      - name: Typecheck all apps
        run: npm run typecheck

      - name: API tests
        working-directory: apps/api
        run: npm test

  validate:
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        app:
          - apps/api
          - apps/user-web
          - apps/doctor-web
          - apps/admin-web
          - apps/operations-web
          - apps/healing-web

    defaults:
      run:
        working-directory: ${{ matrix.app }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install
        run: npm ci ${{ matrix.app == 'apps/healing-web' && '--legacy-peer-deps' || '' }}

      - name: Prisma generate
        if: matrix.app == 'apps/api'
        run: npm run prisma:generate

      - name: Build
        run: npm run build
        env:
          npm_config_legacy_peer_deps: ${{ matrix.app == 'apps/healing-web' && 'true' || '' }}

  test-angular:
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        app:
          - apps/user-web
          - apps/doctor-web
          - apps/admin-web
          - apps/operations-web

    defaults:
      run:
        working-directory: ${{ matrix.app }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install
        run: npm ci

      - name: Unit tests
        run: npm test -- --watch=false
