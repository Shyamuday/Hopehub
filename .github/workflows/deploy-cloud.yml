name: Deploy Cloud

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'deploy/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-cloud.yml'

concurrency:
  group: deploy-s3-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy frontends to S3
    runs-on: ubuntu-latest
    environment: production

    env:
      AWS_REGION: us-east-1
      PATIENT_BUCKET: hopehub
      ADMIN_BUCKET: hopehub-admin
      DOCTOR_BUCKET: hopehub-doctors
      OPERATIONS_BUCKET: hopehub-operations

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Configure production URLs
        env:
          API_PUBLIC_URL: ${{ secrets.API_PUBLIC_URL }}
          WEB_ORIGIN: ${{ secrets.WEB_ORIGIN }}
          DOCTOR_ORIGIN: ${{ secrets.DOCTOR_ORIGIN }}
          OPERATIONS_ORIGIN: ${{ secrets.OPERATIONS_ORIGIN }}
        run: bash deploy/scripts/configure-production-urls.sh

      - name: Build static frontends
        run: bash deploy/scripts/build-static.sh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure S3 website hosting
        run: |
          for bucket in "${PATIENT_BUCKET}" "${ADMIN_BUCKET}" "${DOCTOR_BUCKET}" "${OPERATIONS_BUCKET}"; do
            aws s3 website "s3://${bucket}" --index-document index.html --error-document index.html
          done

      - name: Deploy patient web to S3
        run: |
          aws s3 sync deploy/static/patient "s3://${PATIENT_BUCKET}" --delete --exclude "index.html" --cache-control "public,max-age=31536000,immutable"
          aws s3 cp deploy/static/patient/index.html "s3://${PATIENT_BUCKET}/index.html" --cache-control "no-cache,no-store,must-revalidate"

      - name: Deploy admin web to S3
        run: |
          aws s3 sync deploy/static/admin "s3://${ADMIN_BUCKET}" --delete --exclude "index.html" --cache-control "public,max-age=31536000,immutable"
          aws s3 cp deploy/static/admin/index.html "s3://${ADMIN_BUCKET}/index.html" --cache-control "no-cache,no-store,must-revalidate"

      - name: Deploy doctor web to S3
        run: |
          aws s3 sync deploy/static/doctor "s3://${DOCTOR_BUCKET}" --delete --exclude "index.html" --cache-control "public,max-age=31536000,immutable"
          aws s3 cp deploy/static/doctor/index.html "s3://${DOCTOR_BUCKET}/index.html" --cache-control "no-cache,no-store,must-revalidate"

      - name: Deploy operations web to S3
        run: |
          aws s3 sync deploy/static/operations "s3://${OPERATIONS_BUCKET}" --delete --exclude "index.html" --cache-control "public,max-age=31536000,immutable"
          aws s3 cp deploy/static/operations/index.html "s3://${OPERATIONS_BUCKET}/index.html" --cache-control "no-cache,no-store,must-revalidate"
