name: Deploy Cloud

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        default: production
        type: choice
        options:
          - production
          - staging
  push:
    branches: [main, staging]
    paths:
      - 'apps/**'
      - 'deploy/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-cloud.yml'

concurrency:
  group: deploy-${{ github.event_name == 'workflow_dispatch' && inputs.target || (github.ref == 'refs/heads/staging' && 'staging' || 'production') }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ github.event_name == 'workflow_dispatch' && inputs.target || (github.ref == 'refs/heads/staging' && 'staging' || 'production') }}
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.target || (github.ref == 'refs/heads/staging' && 'staging' || 'production') }}

    env:
      DEPLOY_BRANCH: ${{ github.event_name == 'workflow_dispatch' && (inputs.target == 'staging' && 'staging' || 'main') || (github.ref == 'refs/heads/staging' && 'staging' || 'main') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_BRANCH }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Configure production URLs
        env:
          API_PUBLIC_URL: ${{ secrets.API_PUBLIC_URL }}
          WEB_ORIGIN: ${{ secrets.WEB_ORIGIN }}
          DOCTOR_ORIGIN: ${{ secrets.DOCTOR_ORIGIN }}
          OPERATIONS_ORIGIN: ${{ secrets.OPERATIONS_ORIGIN }}
        run: bash deploy/scripts/configure-production-urls.sh

      - name: Build static frontends
        run: bash deploy/scripts/build-static.sh

      - name: Package release bundle
        run: |
          tar -czf release-static.tar.gz -C deploy static
          tar -czf release-deploy.tar.gz deploy/docker-compose.prod.yml deploy/nginx

      - name: Upload static assets to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: 'release-static.tar.gz,release-deploy.tar.gz'
          target: '/opt/hopehub/incoming'

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          envs: DEPLOY_BRANCH
          script: |
            set -euo pipefail
            cd /opt/hopehub
            git fetch origin "${DEPLOY_BRANCH}"
            git checkout "${DEPLOY_BRANCH}"
            git pull --ff-only origin "${DEPLOY_BRANCH}"
            mkdir -p incoming deploy/static
            tar -xzf incoming/release-static.tar.gz -C .
            tar -xzf incoming/release-deploy.tar.gz
            rm -f incoming/release-static.tar.gz incoming/release-deploy.tar.gz
            docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env build api
            docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env run --rm api npx prisma migrate deploy
            docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env up -d
            docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env exec -T api node -e "fetch('http://127.0.0.1:4000/health').then((r)=>r.json()).then(console.log)"
