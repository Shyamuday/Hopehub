# HopeHub production domains.
# TLS: run deploy/scripts/bootstrap-ec2.sh certbot step, then uncomment the ssl_server blocks.

upstream api_backend {
    server api:4000;
    keepalive 32;
}

# WebSocket upgrade map (Socket.io consultations, chat, payments)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Patient app (user-web) ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name hopehub.in;

    root /usr/share/nginx/html/patient;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── Doctor app ──────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name doctor.hopehub.in;

    root /usr/share/nginx/html/doctor;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── Operations portal (staff, store, admin) ───────────────────────────────────
server {
    listen 80;
    server_name ops.hopehub.in;

    root /usr/share/nginx/html/operations;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── API (REST + Socket.io) ────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.hopehub.in;

    client_max_body_size 20m;

    location /socket.io/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
