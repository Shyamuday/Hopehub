@if (visible()) {
  <button
    type="button"
    class="scroll-to-top"
    (click)="scrollToTop()"
    aria-label="Move to top"
    title="Move to top"
  >
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path
        d="M12 19V5M5 12l7-7 7 7"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
  </button>
}
