<div class="bg-white rounded-lg shadow-md p-4 sm:p-6 hover:shadow-lg transition-shadow duration-300 h-full flex flex-col">
  @if (service().imageUrl) {
    <div class="mb-3 sm:mb-4">
      <img [src]="service().imageUrl" [alt]="service().name" class="w-full h-40 sm:h-48 object-cover rounded-md">
    </div>
  }
  <div class="flex-1 flex flex-col">
    <h3 class="text-lg sm:text-xl font-semibold text-gray-900 mb-2">{{ service().name }}</h3>
    <p class="text-sm sm:text-base text-gray-600 mb-4 flex-1">{{ service().description }}</p>
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2 sm:gap-0">
      <span class="text-xs sm:text-sm text-gray-500 capitalize">{{ service().category }}</span>
      <button 
        (click)="onLearnMore()"
        class="w-full sm:w-auto bg-primary-600 text-white px-3 sm:px-4 py-2 rounded-md hover:bg-primary-700 transition-colors duration-200 text-sm sm:text-base min-h-[44px] sm:min-h-[40px]">
        Learn More
      </button>
    </div>
  </div>
</div>
