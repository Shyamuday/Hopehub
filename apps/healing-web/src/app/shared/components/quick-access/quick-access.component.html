<div class="fixed bottom-6 right-6 z-50">
  <!-- Main FAB Button -->
  <button 
    (click)="toggleMenu()"
    class="w-14 h-14 bg-primary-600 text-white rounded-full shadow-lg hover:bg-primary-700 transition-all duration-200 flex items-center justify-center group"
    [class.rotate-45]="isMenuOpen()"
    aria-label="Quick access menu">
    <svg class="w-6 h-6 transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
    </svg>
  </button>

  <!-- Menu Items -->
  <div class="absolute bottom-16 right-0 space-y-3 transition-all duration-300"
       [class.opacity-0]="!isMenuOpen()"
       [class.opacity-100]="isMenuOpen()"
       [class.pointer-events-none]="!isMenuOpen()"
       [class.translate-y-4]="!isMenuOpen()">
    
    <!-- Assessment -->
    <div class="flex items-center space-x-3">
      <span class="bg-white text-gray-700 px-3 py-1 rounded-full text-sm font-medium shadow-md whitespace-nowrap">
        Take Assessment
      </span>
      <button 
        routerLink="/assessments"
        (click)="closeMenu()"
        class="w-12 h-12 bg-blue-500 text-white rounded-full shadow-lg hover:bg-blue-600 transition-colors duration-200 flex items-center justify-center"
        aria-label="Mental Health Assessment">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
      </button>
    </div>

    <!-- Exercises -->
    <div class="flex items-center space-x-3">
      <span class="bg-white text-gray-700 px-3 py-1 rounded-full text-sm font-medium shadow-md whitespace-nowrap">
        Quick Exercise
      </span>
      <button 
        routerLink="/exercises"
        (click)="closeMenu()"
        class="w-12 h-12 bg-purple-500 text-white rounded-full shadow-lg hover:bg-purple-600 transition-colors duration-200 flex items-center justify-center"
        aria-label="Wellness Exercises">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
        </svg>
      </button>
    </div>

    <!-- Crisis Support -->
    <div class="flex items-center space-x-3">
      <span class="bg-white text-gray-700 px-3 py-1 rounded-full text-sm font-medium shadow-md whitespace-nowrap">
        Need Help Now?
      </span>
      <button 
        (click)="showCrisisSupport()"
        class="w-12 h-12 bg-red-500 text-white rounded-full shadow-lg hover:bg-red-600 transition-colors duration-200 flex items-center justify-center"
        aria-label="Crisis Support">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Crisis Support Modal -->
  @if (showCrisisModal()) {
    <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50"
         (click)="closeCrisisModal()">
      <div class="bg-white rounded-lg p-6 max-w-md w-full" (click)="$event.stopPropagation()">
        <div class="flex items-center mb-4">
          <svg class="w-6 h-6 text-red-500 mr-3" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
          </svg>
          <h3 class="text-lg font-semibold text-gray-900">Crisis Support</h3>
        </div>
        
        <p class="text-gray-600 mb-4">If you're in crisis or having thoughts of self-harm, please reach out for immediate help:</p>
        
        <div class="space-y-3 mb-6">
          <div class="flex items-center justify-between p-3 bg-red-50 rounded-lg">
            <div>
              <div class="font-semibold text-red-800">National Suicide Prevention Lifeline</div>
              <div class="text-red-600">24/7 Crisis Support</div>
            </div>
            <a href="tel:988" class="bg-red-500 text-white px-4 py-2 rounded-lg font-semibold hover:bg-red-600 transition-colors">
              Call 988
            </a>
          </div>
          
          <div class="flex items-center justify-between p-3 bg-blue-50 rounded-lg">
            <div>
              <div class="font-semibold text-blue-800">Crisis Text Line</div>
              <div class="text-blue-600">Text HOME to 741741</div>
            </div>
            <a href="sms:741741?body=HOME" class="bg-blue-500 text-white px-4 py-2 rounded-lg font-semibold hover:bg-blue-600 transition-colors">
              Text Now
            </a>
          </div>
        </div>
        
        <div class="flex space-x-3">
          <button 
            (click)="closeCrisisModal()"
            class="flex-1 bg-gray-200 text-gray-700 px-4 py-2 rounded-lg font-semibold hover:bg-gray-300 transition-colors">
            Close
          </button>
          <button 
            routerLink="/contact"
            (click)="closeCrisisModal()"
            class="flex-1 bg-primary-600 text-white px-4 py-2 rounded-lg font-semibold hover:bg-primary-700 transition-colors">
            Contact Us
          </button>
        </div>
      </div>
    </div>
  }
</div>
