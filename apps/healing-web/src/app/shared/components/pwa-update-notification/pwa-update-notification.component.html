@if (updateNotification()) {
  <div class="fixed top-4 left-4 right-4 md:left-auto md:right-4 md:max-w-sm bg-green-50 border border-green-200 rounded-lg shadow-lg p-4 z-50 animate-slide-down">
    
    <!-- Header -->
    <div class="flex items-start justify-between mb-3">
      <div class="flex items-center space-x-3">
        <div class="w-8 h-8 bg-green-100 rounded-full flex items-center justify-center">
          <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
          </svg>
        </div>
        <div>
          <h3 class="font-semibold text-green-800">Update Available</h3>
          <p class="text-sm text-green-700">New features and improvements are ready</p>
        </div>
      </div>
      <button 
        (click)="dismiss()"
        class="text-green-400 hover:text-green-600 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Update Info -->
    <div class="mb-4">
      <p class="text-sm text-green-700">
        This update includes new mental health resources and improved offline functionality.
      </p>
    </div>

    <!-- Actions -->
    <div class="flex space-x-3">
      <button 
        (click)="update()"
        class="flex-1 bg-green-600 text-white px-4 py-2 rounded-lg font-semibold hover:bg-green-700 transition-colors">
        Update Now
      </button>
      <button 
        (click)="dismiss()"
        class="px-4 py-2 text-green-600 hover:text-green-800 transition-colors">
        Later
      </button>
    </div>
  </div>
}
