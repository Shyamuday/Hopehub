@if (isOpen()) {
    <div 
        class="modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-4 overflow-y-auto"
        (click)="onBackdropClick($event)"
        role="dialog"
        aria-modal="true"
        [attr.aria-label]="currentModal() === 'login' ? 'Login' : currentModal() === 'register' ? 'Register' : 'Forgot Password'">
        
        <div
            class="modal-content auth-card-shell bg-white w-full transform transition-all duration-300 scale-100"
            (click)="$event.stopPropagation()">
            
            <!-- Close Button -->
            <button
                (click)="close()"
                class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 transition-colors z-10"
                aria-label="Close modal">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>

            <!-- Modal Content -->
            <div class="relative">
                @if (currentModal() === 'login') {
                    <app-login></app-login>
                }
                @if (currentModal() === 'register') {
                    <app-register></app-register>
                }
                @if (currentModal() === 'forgot-password') {
                    <app-forgot-password></app-forgot-password>
                }
            </div>
        </div>
    </div>
}
