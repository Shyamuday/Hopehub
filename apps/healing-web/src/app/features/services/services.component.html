<div class="container mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8">
  <h1 class="text-3xl sm:text-4xl font-bold text-center text-gray-900 mb-6 sm:mb-8">
    Our Services
  </h1>
  <p class="text-base sm:text-lg text-center text-gray-600 max-w-2xl mx-auto mb-8 sm:mb-12">
    Comprehensive mental health services tailored to your needs.
  </p>
  
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
    @for (service of services(); track service.id) {
      <div class="cursor-pointer transform hover:scale-105 transition-transform duration-200"
           (click)="navigateToService(service.id)">
        <app-service-card 
          [service]="service"
          (learnMore)="navigateToService($event)">
        </app-service-card>
      </div>
    }
  </div>
</div>
