<main class="admin-shell">
  <header class="topbar">
    <div class="topbar-left">
      <button type="button" class="back-btn" (click)="backToOps()">← Operations</button>
      <h1>Admin Console</h1>
    </div>
    <div class="topbar-actions">
      <app-notification-bell-host [config]="bellConfig()" />
      <button type="button" (click)="logout()">Logout</button>
    </div>
  </header>

  <nav class="tabs">
    @for (item of navItems(); track item.path) {
      <a [routerLink]="item.path" routerLinkActive="active">{{ item.label }}</a>
    }
  </nav>

  <section class="content">
    <app-role-task-guide appKey="operations-web" theme="dark" />
    <router-outlet />
  </section>
</main>
