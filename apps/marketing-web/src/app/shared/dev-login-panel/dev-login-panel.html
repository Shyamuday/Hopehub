@if (enabled) {
  <aside class="dev-login-panel">
    <p class="dev-tag">Dev only</p>
    <h3>Demo accounts</h3>
    <p class="dev-note">Click <strong>Fill</strong> then <strong>Sign In</strong>. Any other email also works in dev.</p>
    @for (persona of personas(); track persona.id) {
      <div class="dev-row">
        <div class="dev-row-meta">
          <strong>{{ persona.label }}</strong>
          <code>{{ persona.loginLabel }}</code>
        </div>
        <div class="dev-row-actions">
          <button type="button" class="dev-btn ghost" [disabled]="loading()" (click)="emitFill(persona)">Fill</button>
          <button type="button" class="dev-btn" [disabled]="loading()" (click)="quickLogin(persona.id)">Instant</button>
        </div>
      </div>
    }
    @if (password()) { <p class="dev-creds">Password: <strong>{{ password() }}</strong></p> }
    @if (error()) { <p class="dev-error">{{ error() }}</p> }
  </aside>
}
