
    <div class="login-page">
      <div class="login-card">
        <div class="login-header">
          <div class="login-logo">🏥</div>
          <h1 class="login-title">Call Center Desk</h1>
          <p class="login-subtitle">Sign in to manage walk-ins and queue</p>
        </div>

        @if (error()) {
          <div class="error-banner">
            ⚠️ {{ error() }}
          </div>
        }

        <form class="login-form" (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input
              class="form-input"
              type="email"
              [(ngModel)]="email"
              name="email"
              placeholder="reception@clinic.com"
              required
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-wrap">
              <input
                class="form-input"
                [type]="showPass() ? 'text' : 'password'"
                [(ngModel)]="password"
                name="password"
                placeholder="Enter password"
                required
                autocomplete="current-password"
              />
              <button
                type="button"
                class="pass-toggle"
                (click)="showPass.set(!showPass())"
              >{{ showPass() ? '🙈' : '👁️' }}</button>
            </div>
          </div>

          <button
            type="submit"
            class="login-btn"
            [disabled]="loading()"
          >
            @if (loading()) {
              <span class="spinner"></span> Signing in...
            } @else {
              Sign In
            }
          </button>
        </form>

        <app-dev-login-panel (loggedIn)="onDevLoggedIn()" (fillAccount)="applyDevFill($event)" />
      </div>
    </div>
