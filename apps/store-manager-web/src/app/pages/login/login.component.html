
    <div class="login-bg">
      <div class="login-container">
        <div class="brand">
          <div class="brand-icon">👔</div>
          <h1>Vitalis Store Manager</h1>
          <p>Branch oversight, staff, patients & inventory</p>
        </div>

        <div class="manager-section fade-in">
          <div class="form-group">
            <label>Manager email</label>
            <input class="input" type="email" [(ngModel)]="email" placeholder="manager@ranchi.vitalis.local" autocomplete="email" />
          </div>
          <div class="form-group" style="margin-top: 14px;">
            <label>Password</label>
            <div class="password-wrap">
              <input class="input" [type]="showPassword() ? 'text' : 'password'" [(ngModel)]="password" placeholder="••••••••" autocomplete="current-password" />
              <button type="button" class="show-pass-btn" (click)="showPassword.update(v => !v)">
                {{ showPassword() ? '🙈' : '👁️' }}
              </button>
            </div>
          </div>
          <button class="btn btn-primary login-btn" (click)="login()" [disabled]="loading() || !email || !password">
            @if (loading()) {
              <span class="btn-spinner"></span> Logging in...
            } @else {
              Sign in
            }
          </button>
        </div>

        @if (error()) {
          <div class="error-msg fade-in">
            ⚠️ {{ error() }}
          </div>
        }

        <p class="staff-app-hint">Counter staff should use the <strong>Store Staff</strong> app on port 4300.</p>

        <app-dev-login-panel (loggedIn)="onDevLoggedIn()" (fillAccount)="applyDevFill($event)" />
      </div>
    </div>
