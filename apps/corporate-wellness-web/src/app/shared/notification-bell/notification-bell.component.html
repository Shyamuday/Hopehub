<div class="bell-wrap">
  <button type="button" class="bell-btn" (click)="toggle()" aria-label="Notifications">
    🔔
    @if (unreadCount() > 0) {
      <span class="badge">{{ unreadCount() > 99 ? '99+' : unreadCount() }}</span>
    }
  </button>

  @if (open()) {
    <div class="backdrop" (click)="close()"></div>
    <div class="panel" (click)="$event.stopPropagation()">
      <div class="panel-head">
        <strong>Notifications</strong>
        <button type="button" class="link" (click)="markAllRead()">Mark all read</button>
      </div>

      @if (loading()) {
        <p class="muted">Loading…</p>
      } @else if (error()) {
        <p class="error">{{ error() }}</p>
      } @else if (!items().length) {
        <p class="muted">No notifications yet.</p>
      } @else {
        <ul class="list">
          @for (item of items(); track item.id) {
            <li [class.unread]="!item.readAt" (click)="markRead(item)">
              <div class="title">{{ item.title }}</div>
              <div class="body">{{ item.body }}</div>
              <div class="time muted">{{ item.createdAt | date: 'short' }}</div>
            </li>
          }
        </ul>
      }
    </div>
  }
</div>
