
    <section class="panel hero-panel">
      <div class="home-hero home-hero--booking">
        <div class="hero-intro">
          <p class="hero-eyebrow">{{ heroEyebrow() }}</p>
          <h1 class="hero-headline">{{ heroHeadline() }}</h1>
          <p class="hero-lead">{{ heroLead() }}</p>
        </div>

        <div class="booking-card">
          <h1 class="booking-title">{{ copy.booking.formTitle }}</h1>
          <p class="bc-sub">{{ copy.booking.formSubtitle }}</p>

          <div class="bc-fields">
            <label class="bc-field">
              <span class="bc-label">{{ copy.booking.emailLabel }}</span>
              <input
                [formField]="bookingForm.email"
                [placeholder]="copy.booking.emailPlaceholder"
                type="email"
                autocomplete="email"
              />
            </label>

            <button class="bc-btn" type="button" [disabled]="busy()" (click)="sendOtp()">
              {{ copy.booking.submitLabel }}
            </button>
          </div>

          @if (error()) {
            <p class="bc-error">{{ error() }}</p>
          }
          <p class="bc-hint">{{ copy.booking.hint }}</p>
        </div>

        <div class="hero-trust-row">
          @for (item of copy.trustItems; track item) {
            <div class="trust-item">
              <span class="trust-icon">✓</span>
              <span>{{ item }}</span>
            </div>
          }
        </div>
      </div>
    </section>
