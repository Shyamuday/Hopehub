
    <section class="public-shell">
      <app-header [subtitle]="copy.headerSubtitle" [whatsappLink]="whatsappLink()" />
      <main class="content-page">
        <section class="page-hero panel">
          <p class="eyebrow">{{ copy.eyebrow }}</p>
          <h1>{{ copy.title }}</h1>
          <p>{{ copy.body }}</p>
          <a class="primary home-action" [href]="copy.ctaHref">{{ copy.ctaLabel }}</a>
        </section>
        <section class="content-grid three">
          @for (pillar of copy.pillars; track pillar.title) {
            <div class="panel">
              <h2>{{ pillar.title }}</h2>
              <p>{{ pillar.body }}</p>
            </div>
          }
        </section>
      </main>
      <app-footer [whatsappLink]="whatsappLink()" />
    </section>
