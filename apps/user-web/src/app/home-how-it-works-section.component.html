
    <section class="how-it-works-section">
      <div class="section-header">
        <p class="eyebrow">{{ copy.howItWorks.eyebrow }}</p>
        <h2 class="section-title">{{ copy.howItWorks.title }}</h2>
        <p class="section-subtitle">{{ copy.howItWorks.subtitle }}</p>
      </div>

      <div class="steps-grid">
        @for (step of copy.howItWorks.steps; track step.number; let last = $last) {
          <article class="step-card">
            <div class="step-number">{{ step.number }}</div>
            <div class="step-icon">{{ step.icon }}</div>
            <h3>{{ step.title }}</h3>
            <p>{{ step.body }}</p>
          </article>
          @if (!last) {
            <div class="step-connector"></div>
          }
        }
      </div>
    </section>
