<main class="doctor-shell">
  <header class="app-header-bar">
    <div class="header-brand">
      <h1>Doctor Console</h1>
    </div>

    <nav class="header-nav" aria-label="Doctor sections">
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="/appointments" routerLinkActive="active">Appointments</a>
      <a routerLink="/patients" routerLinkActive="active">Patients</a>
      <a routerLink="/profile" routerLinkActive="active">Profile</a>
    </nav>

    <div class="header-actions">
      <button type="button" class="btn-logout" (click)="logout()">Logout</button>
    </div>
  </header>

  <section class="content">
    <router-outlet />
  </section>
</main>
