<section class="login-card">
  <div class="switcher">
    <button type="button" [class.active]="mode === 'signin'" (click)="mode = 'signin'">Sign in</button>
    <button type="button" [class.active]="mode === 'enroll'" (click)="mode = 'enroll'">Enroll</button>
  </div>

  @if (mode === 'signin') {
    <h2>Doctor Login</h2>
    <p>Use your doctor account to access dashboard and patient workflows.</p>

    <form (ngSubmit)="submit()">
      <label for="email">Email</label>
      <input id="email" name="email" [(ngModel)]="email" type="email" />

      <label for="password">Password</label>
      <input id="password" name="password" [(ngModel)]="password" type="password" />

      @if (error) {
        <p class="error">{{ error }}</p>
      }

      <button type="submit">Sign in</button>
    </form>
  } @else {
    <h2>Doctor Enrollment</h2>
    <p>Create doctor account with your specialty profile.</p>

    <form (ngSubmit)="enroll()">
      <label for="name">Full name</label>
      <input id="name" name="name" [(ngModel)]="name" />

      <label for="enrollEmail">Email</label>
      <input id="enrollEmail" name="enrollEmail" [(ngModel)]="email" type="email" />

      <label for="mobile">Mobile</label>
      <input id="mobile" name="mobile" [(ngModel)]="mobile" />

      <label for="specialty">Specialty</label>
      <input id="specialty" name="specialty" [(ngModel)]="specialty" />

      <label for="registrationNo">Registration number</label>
      <input id="registrationNo" name="registrationNo" [(ngModel)]="registrationNo" />

      <label for="enrollPassword">Password</label>
      <input id="enrollPassword" name="enrollPassword" [(ngModel)]="password" type="password" />

      @if (error) {
        <p class="error">{{ error }}</p>
      }

      <button type="submit">Create account</button>
    </form>
  }
</section>
