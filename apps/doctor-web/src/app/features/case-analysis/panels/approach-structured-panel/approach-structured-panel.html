<section class="panel approach-panel">
  <div class="panel-title-row">
    <h3>{{ config.title }}</h3>
    <div class="panel-save-actions">
      <span class="autosave-note muted">Auto-saves as you type</span>
      <button type="button" class="btn-save-now" (click)="save()" [disabled]="saving">{{ saving ? 'Saving…' : 'Save now' }}</button>
    </div>
  </div>
  <p class="hint">{{ config.hint }}</p>

  @if (config.combinationCatalog) {
    <div class="combination-catalog">
      <h4>Combination catalog</h4>
      <div class="combination-list">
        @for (item of combinationCatalog; track item.id) {
          <article class="combination-card" [class.selected]="model()['combinationName'] === item.name">
            <div>
              <strong>{{ item.name }}</strong>
              <p class="muted">{{ item.componentRemedies }}</p>
              <small>{{ item.indications }}</small>
            </div>
            <button type="button" (click)="selectCombination(item)">
              {{ model()['combinationName'] === item.name ? 'Selected' : 'Use' }}
            </button>
          </article>
        }
      </div>
    </div>
  }

  <div class="approach-grid">
    @for (field of config.fields; track field.key) {
      <label [class.wide]="field.wide">
        <span class="field-label-row">
          <span class="field-label">
            {{ field.label }}
            <app-approach-field-hint [field]="field" />
            @if (field.required || config.requiredKeys?.includes(field.key)) {
              <span class="required-badge">Required</span>
            }
          </span>
          <span class="field-actions">
            @if (field.rubricSearchable) {
              <button
                type="button"
                class="btn-field-action"
                (click)="searchRubricsFromField(field)"
                [disabled]="!model()[field.key]?.trim()"
              >
                Search rubrics
              </button>
            }
            @if (field.suggestEndpoint) {
              <button type="button" class="btn-field-action btn-ai" (click)="suggestField(field)">
                @switch (field.suggestEndpoint) {
                  @case ('ai-extract-intake') { From intake }
                  @case ('ai-extract-media') { From photos }
                  @default { Suggest }
                }
              </button>
            }
          </span>
        </span>

        @if (field.fieldType === 'select') {
          <select [formField]="form[field.key]">
            <option value="">Select…</option>
            @for (option of field.options || []; track option.value) {
              <option [value]="option.value">{{ option.label }}</option>
            }
          </select>
        } @else if (isMultiline(field)) {
          <textarea
            [rows]="field.rows || 2"
            [formField]="form[field.key]"
            [attr.placeholder]="field.placeholder || null"
          ></textarea>
        } @else {
          <input [formField]="form[field.key]" [attr.placeholder]="field.placeholder || null" />
        }
      </label>
    }
  </div>
</section>
