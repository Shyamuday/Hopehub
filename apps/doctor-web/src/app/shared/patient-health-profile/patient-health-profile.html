<section class="health-profile" [class.compact]="compact">
  <h3>Clinical profile</h3>
  @if (!hasAny()) {
    <p class="empty-state">No allergies, medications, or chronic conditions recorded by the patient yet.</p>
  } @else {
    <hopehub-detail-rows variant="grid" [rows]="rows()" />
  }
</section>
