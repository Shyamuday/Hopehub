<main class="admin-shell">
  <header class="admin-header">
    <div class="topbar">
      <div class="topbar-brand">
        <h1>Admin Console</h1>
      </div>

      <app-admin-nav-tabs [items]="filteredNavItems()" />

      <div class="topbar-actions">
        <app-notification-bell-host [config]="bellConfig" />
        <a class="account-link" [routerLink]="accountPath">Account</a>
        <button type="button" class="logout-btn" (click)="logout()">Logout</button>
      </div>    </div>
  </header>

  <section class="content">
    <app-role-task-guide appKey="admin-web" />
    <router-outlet />
  </section>
</main>
