<header class="login-header-bar">
  <a routerLink="/login" class="login-brand">Admin Console</a>
  <nav class="login-nav" aria-label="Login navigation">
    <span class="nav-pill active" aria-current="page">Sign in</span>
    @if (patientPortalUrl) {
      <a [href]="patientPortalUrl" class="nav-link-external" target="_blank" rel="noopener noreferrer">
        Patient site
      </a>
    }
  </nav>
</header>

<section class="login-card">
  <h2>Admin Login</h2>
  <p>Manage doctors and consumers from one console.</p>

  <form (ngSubmit)="submit()">
    <label for="email">Email</label>
    <input id="email" name="email" [(ngModel)]="email" type="email" />

    <label for="password">Password</label>
    <input id="password" name="password" [(ngModel)]="password" type="password" />

    @if (error) {
      <p class="error">{{ error }}</p>
    }

    <button type="submit" [disabled]="submitting">
      {{ submitting ? 'Signing in...' : 'Sign in' }}
    </button>
  </form>
</section>
