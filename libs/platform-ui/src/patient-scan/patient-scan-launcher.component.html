<div class="scan-launcher-page">
  <hopehub-patient-scan-panel
    [loading]="loading()"
    [beforeCamera]="beforeCamera()"
    (codeSubmit)="openCode($event)"
    (scanError)="error.set($event)"
  />

  @if (error()) {
    <p class="page-error">{{ error() }}</p>
  }

  @if (lastPatient(); as patient) {
    <p class="found">Found: <strong>{{ patient.name }}</strong> ({{ patient.patientCode }})</p>
  }
</div>
